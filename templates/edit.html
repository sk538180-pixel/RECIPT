<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit HTML Code</title>
    <style>
        body { font-family: Arial; padding: 10px; margin: 0; background: #333; color: white;}
        textarea {
            width: 100%;
            height: 80vh; /* Mobile screen ke hisab se bada textarea */
            font-family: monospace;
            font-size: 13px;
            padding: 10px;
            box-sizing: border-box;
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #555;
            white-space: pre;
            overflow: auto;
        }
        button { padding: 12px; width: 48%; background: #28a745; color: white; border: none; font-size: 16px; cursor: pointer;}
        .cancel-btn { padding: 12px; width: 48%; background: #dc3545; color: white; text-align: center; text-decoration: none; display: inline-block; font-size: 16px; box-sizing: border-box;}
    </style>
</head>
<body>

    <h3 style="text-align: center;">Editing Code: /{{ page[1] }}</h3>

    <form action="/update/{{ page[0] }}" method="POST">
        <textarea name="html_content" required>{{ page[2] }}</textarea>

        <div style="margin-top: 10px; display: flex; justify-content: space-between;">
            <button type="submit">Save Code</button>
            <a href="/" class="cancel-btn">Cancel</a>
        </div>
    </form>

</body>
</html>
