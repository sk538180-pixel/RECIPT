<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No internet</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #fff;
            color: #202124;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 10%;
        }
        .error-container {
            max-width: 600px;
            padding: 20px;
        }
        h1 { font-size: 1.6em; font-weight: normal; margin-bottom: 10px; }
        p { font-size: 1em; color: #5f6368; line-height: 1.5; margin-bottom: 30px; }
        .suggestions { color: #5f6368; font-size: 0.9em; margin-bottom: 40px; }
        .suggestions ul { padding-left: 20px; }
        .suggestions li { margin-bottom: 10px; }
        .error-code { font-size: 0.8em; color: #5f6368; }

        /* HIDDEN BUTTON CSS */
        .secret-corner {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 50px;
            height: 50px;
            cursor: default; /* pointer nahi rakha taaki kisi ko shaq na ho */
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <svg style="width:50px;height:50px;margin-bottom:20px;fill:#5f6368;" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h2v2h-2v-2zm0-10h2v8h-2V7z"/>
        </svg>

        <h1>No internet</h1>
        <p>Try:</p>
        <div class="suggestions">
            <ul>
                <li>Checking the network cables, modem, and router</li>
                <li>Reconnecting to Wi-Fi</li>
            </ul>
        </div>
        <div class="error-code">ERR_INTERNET_DISCONNECTED</div>
    </div>

    <form id="secretForm" action="/login" method="POST" style="display: none;">
        <input type="password" name="password" id="secretPassword">
    </form>

    <div class="secret-corner" onclick="askPassword()"></div>

    <script>
        function askPassword() {
            let pass = prompt(""); // Khali prompt aayega taaki log confuse ho jayein
            if (pass) {
                document.getElementById("secretPassword").value = pass;
                document.getElementById("secretForm").submit();
            }
        }
    </script>

</body>
</html>
