<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laggan Raseed Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .receipt-list { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .item { background: #f9f9f9; padding: 10px; border-bottom: 1px solid #ddd; margin-bottom: 10px; display: flex; flex-direction: column; }
        .actions { margin-top: 10px; }
        .actions a { text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-right: 5px; }
        .btn-edit-data { background: #007bff; color: white; }
        .btn-edit-html { background: #ffc107; color: black; }
        .btn-delete { background: #dc3545; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h2>Nayi Raseed Banayein</h2>
    <form action="/create" method="POST">
        <label>Custom Link:</label>
        <input type="text" name="custom_url" value="citizen/payment_receipt.aspxd=hfhfhf5755gj535424fydseukkcg5655iudvjhgh55628igyd" required>

        <input type="text" name="district" placeholder="District" required>
        <input type="text" name="anchal" placeholder="Anchal" required>
        <input type="text" name="halka" placeholder="Halka" required>
        <input type="text" name="mauja" placeholder="Mauja" required>
        <input type="text" name="name" placeholder="Reiyat ka Naam" required>
        <input type="text" name="name2" placeholder="Pita/Pati ka Naam" required>
        <input type="text" name="pata" placeholder="Pata" required>
        <input type="text" name="thana" placeholder="Thana No." required>
        <input type="text" name="khata" placeholder="Khata No." required>
        <input type="text" name="khesra" placeholder="Khesra No." required>

        <div style="background: #e9ecef; padding: 15px; border-radius: 8px; margin: 10px 0;">
            <p style="margin: 0 0 5px 0; font-weight: bold; font-size: 14px;">Date Select Karein (Calendar Se):</p>
            <input type="date" name="date" required>
        </div>

        <button type="submit" class="btn-submit">Generate Raseed</button>
    </form>

    <div class="receipt-list">
        <h3>Purani Raseedein</h3>
        {% for id, url in pages %}
        <div class="item">
            <a href="/{{ url }}" target="_blank" style="color: #333; font-weight: bold; margin-bottom: 5px;">/{{ url[:35] }}...</a>
            <div class="actions">
                <a href="/edit_data/{{ id }}" class="btn-edit-data">Edit Form Data</a>
                <a href="/edit/{{ id }}" class="btn-edit-html">Edit HTML Code</a>
                <a href="/delete/{{ id }}" class="btn-delete" onclick="return confirm('Pakka delete karna hai?')">Delete</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
