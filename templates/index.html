<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laggan Raseed Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .receipt-list { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .item { background: #f9f9f9; padding: 10px; border-bottom: 1px solid #ddd; margin-bottom: 10px; display: flex; flex-direction: column; }
        .actions { margin-top: 10px; }
        .actions a { text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-right: 5px; }
        .btn-edit-data { background: #007bff; color: white; }
        .btn-edit-html { background: #ffc107; color: black; }
        .btn-delete { background: #dc3545; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h2>Nayi Raseed Banayein</h2>
    <div style="margin-bottom: 20px; background: #e9ecef; padding: 10px; border-radius: 8px; text-align: center;">
        <label style="margin-right: 20px; font-weight: bold; cursor: pointer;">
            <input type="radio" name="form_type" value="data" checked onclick="toggleForms()"> Form Data Se
        </label>
        <label style="font-weight: bold; cursor: pointer;">
            <input type="radio" name="form_type" value="html" onclick="toggleForms()"> Direct HTML Se
        </label>
    </div>

    <!-- DATA FORM -->
    <div id="form-data-section">
        <form action="/create" method="POST">
        <label>Custom Link:</label>
        <input type="text" name="custom_url" value="citizen/payment_receipt.aspxd=hfhfhf5755gj535424fydseukkcg5655iudvjhgh55628igyd" required>

        <input type="text" name="district" placeholder="District" required>
        <input type="text" name="anchal" placeholder="Anchal" required>
        <input type="text" name="halka" placeholder="Halka" required>
        <input type="text" name="mauja" placeholder="Mauja" required>
        <input type="text" name="name" placeholder="Reiyat ka Naam" required>
        <input type="text" name="name2" placeholder="Pita/Pati ka Naam" required>
        <input type="text" name="pata" placeholder="Pata" required>
        <input type="text" name="thana" placeholder="Thana No." required>
        <input type="text" name="khata" placeholder="Khata No." required>
        <input type="text" name="khesra" placeholder="Khesra No." required>

        <div style="background: #e9ecef; padding: 15px; border-radius: 8px; margin: 10px 0;">
            <p style="margin: 0 0 5px 0; font-weight: bold; font-size: 14px;">Date Select Karein (Calendar Se):</p>
            <input type="date" name="date" required>
        </div>

        <button type="submit" class="btn-submit">Generate Raseed</button>
        </form>
    </div>

    <!-- HTML FORM -->
    <div id="form-html-section" style="display: none;">
        <form action="/create_from_html" method="POST">
            <label>Custom Link:</label>
            <input type="text" name="custom_url" value="citizen/payment_receipt.aspxd=hfhfhf5755gj535424fydseukkcg5655ghbdfgfdbdxfgdfhfbsdghdsdtryfhfgbgsfrwekioiuhjfgsdfetrgiudvjhgh55628igyd" required>
            
            <label>जमाबंदी रेयत का नाम (Optional - HTML में बदलने के लिए):</label>
            <input type="text" name="jamabandi_name" placeholder="नया नाम डालें (अगर बदलना हो)...">
            
            <label>अभिभावक का नाम (Optional - HTML में बदलने के लिए):</label>
            <input type="text" name="guardian_name" placeholder="नया नाम डालें (अगर बदलना हो)...">

            <label>हल्का (Optional - HTML में बदलने के लिए):</label>
            <input type="text" name="halka_name" placeholder="नया हल्का डालें (अगर बदलना हो)...">

            <label>मौजा (Optional - HTML में बदलने के लिए):</label>
            <input type="text" name="mauja_name" placeholder="नया मौजा डालें (अगर बदलना हो)...">

            <label>मौजा/थाना संख्या (Optional - HTML में बदलने के लिए):</label>
            <input type="text" name="mauja_thana_name" placeholder="नया मौजा/थाना संख्या डालें (अगर बदलना हो)...">

            <label>HTML Code:</label>
            <textarea name="html_content" rows="15" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;" placeholder="Yahan pura HTML paste karein..." required></textarea>
            
            <button type="submit" class="btn-submit" style="background: #007bff;">HTML Se Raseed Banayein</button>
        </form>
    </div>

    <div class="receipt-list">
        <h3>Purani Raseedein</h3>
        {% for id, url, name in pages %}
        <div class="item">
            <a href="/{{ url }}" target="_blank" style="color: #333; font-weight: bold; margin-bottom: 5px;">{{ name }}</a>
            <div class="actions">
                <a href="/edit_data/{{ id }}" class="btn-edit-data">Edit Form Data</a>
                <a href="/edit/{{ id }}" class="btn-edit-html">Edit HTML Code</a>
                <a href="/delete/{{ id }}" class="btn-delete" onclick="return confirm('Pakka delete karna hai?')">Delete</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    function toggleForms() {
        var formType = document.querySelector('input[name="form_type"]:checked').value;
        if (formType === 'data') {
            document.getElementById('form-data-section').style.display = 'block';
            document.getElementById('form-html-section').style.display = 'none';
        } else {
            document.getElementById('form-data-section').style.display = 'none';
            document.getElementById('form-html-section').style.display = 'block';
        }
    }
</script>
</body>
</html>
